<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <filter id="cardShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#1b1b18" flood-opacity="0.13"/>
    </filter>
  </defs>

  <!-- paper squircle (macOS safe area: 824 on a 1024 canvas) -->
  <rect x="100" y="100" width="824" height="824" rx="186" ry="186"
        fill="#fbfbf9" stroke="#e6e4db" stroke-width="3" filter="url(#cardShadow)"/>

  <!-- the one accent: electric cobalt = live, echoing .sb-brand-mark. the halo is cobalt at
       0.22 opacity (the same wash the working dot breathes behind), not a solid pale fill. -->
  <circle cx="512" cy="512" r="250" fill="#1f5ae6" fill-opacity="0.22"/>
  <circle cx="512" cy="512" r="150" fill="#1f5ae6"/>
</svg>
